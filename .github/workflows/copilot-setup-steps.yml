name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation,
# and allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies,
      # you'll need the `contents: read` permission.
      # If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Add language-specific setup steps as needed for your project
      # Examples below - uncomment or modify based on your actual tech stack:

      # For Node.js/JavaScript projects:
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      #
      # - name: Install JavaScript dependencies
      #   run: npm ci

      # For Python projects:
      # - name: Set up Python
      #   uses: actions/setup-python@v4
      #   with:
      #     python-version: "3.11"
      #     cache: "pip"
      #
      # - name: Install Python dependencies
      #   run: pip install -r requirements.txt

      # For Java projects:
      # - name: Set up Java
      #   uses: actions/setup-java@v4
      #   with:
      #     java-version: "21"
      #     distribution: "temurin"
      #     cache: "maven"

      # For .NET projects:
      # - name: Set up .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: "8.0"

      # For Go projects:
      # - name: Set up Go
      #   uses: actions/setup-go@v4
      #   with:
      #     go-version: "1.21"
      #     cache: "go"

      # Git/version control tools are available by default on GitHub Actions runners
      # (git, gh CLI, etc.) so no additional setup is needed for basic Git operations

      - name: Verify setup
        run: |
          echo "Setup steps completed successfully"
          git --version
